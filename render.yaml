services:
  # Backend — FastAPI
  - type: web
    name: pagestreak-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pagestreak-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://pagestreak-frontend.onrender.com
      - key: SENTRY_DSN
        sync: false   # Set manually in Render dashboard

  # Frontend — Static Site (React build)
  - type: web
    name: pagestreak-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    plan: free
    routes:
      - type: rewrite
        source: /api/*
        destination: https://pagestreak-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://pagestreak-backend.onrender.com

databases:
  - name: pagestreak-db
    databaseName: pagestreak
    plan: free
